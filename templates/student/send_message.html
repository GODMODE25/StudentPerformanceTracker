{% extends "base.html" %}

{% block title %}Send Message - Student Dashboard{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-paper-plane me-2"></i>Send Message</h1>
    <a href="{{ url_for('student.messages') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back to Messages
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0"><i class="fas fa-envelope me-2"></i>Compose Message</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="receiver_id" class="form-label">
                            <i class="fas fa-user me-1"></i>Send To *
                        </label>
                        <select class="form-select" id="receiver_id" name="receiver_id" required>
                            <option value="">Select recipient</option>
                            {% for user in recipients %}
                            <option value="{{ user.id }}">{{ user.full_name }} ({{ user.role.title() }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="subject" class="form-label">
                            <i class="fas fa-tag me-1"></i>Subject *
                        </label>
                        <input type="text" class="form-control" id="subject" name="subject" 
                               placeholder="Enter message subject" required>
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label">
                            <i class="fas fa-comment me-1"></i>Message *
                        </label>
                        <textarea class="form-control" id="content" name="content" rows="6" 
                                  placeholder="Type your message here..." required></textarea>
                        <div class="form-text">
                            <span id="charCount">0</span>/500 characters
                        </div>
                    </div>

                    <!-- Quick Templates for Students -->
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-templates me-1"></i>Message Templates
                        </label>
                        <div class="btn-group-vertical d-grid gap-2">
                            <button type="button" class="btn btn-outline-secondary btn-sm" 
                                    onclick="useTemplate('question', 'Question about Assignment', 'I have a question about the recent assignment...')">
                                <i class="fas fa-question-circle me-2"></i>Question about Assignment
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" 
                                    onclick="useTemplate('help', 'Request for Help', 'I am having difficulty understanding the topic we covered in class...')">
                                <i class="fas fa-hand-paper me-2"></i>Request for Help
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" 
                                    onclick="useTemplate('absence', 'Absence Explanation', 'I was absent from class on [date] due to...')">
                                <i class="fas fa-calendar-times me-2"></i>Explain Absence
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" 
                                    onclick="useTemplate('schedule', 'Schedule Meeting', 'I would like to schedule a meeting to discuss my academic progress...')">
                                <i class="fas fa-calendar-plus me-2"></i>Schedule Meeting
                            </button>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('student.messages') }}" class="btn btn-secondary me-md-2">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane me-2"></i>Send Message
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const contentTextarea = document.getElementById('content');
    const charCount = document.getElementById('charCount');
    
    // Character count
    contentTextarea.addEventListener('input', function() {
        const count = this.value.length;
        charCount.textContent = count;
        
        if (count > 500) {
            charCount.parentElement.classList.add('text-danger');
            this.setCustomValidity('Message is too long (maximum 500 characters)');
        } else {
            charCount.parentElement.classList.remove('text-danger');
            this.setCustomValidity('');
        }
    });
});

function useTemplate(type, subject, content) {
    document.getElementById('subject').value = subject;
    document.getElementById('content').value = content;
    
    // Trigger event to update character count
    document.getElementById('content').dispatchEvent(new Event('input'));
    
    // Focus on the content area for editing
    document.getElementById('content').focus();
}
</script>
{% endblock %}
