{% extends "base.html" %}

{% block title %}Create Enrollment - Admin Dashboard{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-book-open me-2"></i>Create New Enrollment</h1>
    <a href="{{ url_for('admin.manage_enrollments') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back to Enrollments
    </a>
</div>

<!-- Create Enrollment Form -->
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0"><i class="fas fa-plus-circle me-2"></i>Enrollment Information</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="student_id" class="form-label">Student</label>
                        <select class="form-control" id="student_id" name="student_id" required>
                            <option value="">Select a student</option>
                            {% for student in students %}
                            <option value="{{ student.user.id }}">{{ student.user.full_name }} ({{ student.student_id }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="course_id" class="form-label">Course</label>
                        <select class="form-control" id="course_id" name="course_id" required>
                            <option value="">Select a course</option>
                            {% for course in courses %}
                            <option value="{{ course.id }}">{{ course.name }} ({{ course.code }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="enrollment_date" class="form-label">Enrollment Date</label>
                        <input type="date" class="form-control" id="enrollment_date" name="enrollment_date" value="{{ date.today().strftime('%Y-%m-%d') }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-control" id="status" name="status">
                            <option value="active">Active</option>
                            <option value="completed">Completed</option>
                            <option value="dropped">Dropped</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="grade" class="form-label">Grade</label>
                <input type="text" class="form-control" id="grade" name="grade" maxlength="2" placeholder="A+, A, B, etc.">
            </div>
            
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Create Enrollment
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
