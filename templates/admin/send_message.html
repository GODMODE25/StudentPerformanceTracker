{% extends "base.html" %}

{% block title %}Send Message{% endblock %}

{% block content %}
<div class="container">
    <h1 class="my-4">Send a New Message</h1>

    <div class="card">
        <div class="card-body">
            <form action="{{ url_for('admin.send_message') }}" method="POST">
                <div class="mb-3">
                    <label for="recipient_id" class="form-label">Recipient</label>
                    <select class="form-select" id="recipient_id" name="recipient_id" required>
                        <option value="" disabled selected>Select a recipient</option>
                        {% for recipient in recipients %}
                        <option value="{{ recipient.id }}">{{ recipient.full_name }} ({{ recipient.role.title() }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="subject" class="form-label">Subject</label>
                    <input type="text" class="form-control" id="subject" name="subject" required>
                </div>
                <div class="mb-3">
                    <label for="content" class="form-label">Message</label>
                    <textarea class="form-control" id="content" name="content" rows="8" required></textarea>
                </div>
                <div class="d-flex justify-content-end">
                    <a href="{{ url_for('admin.messages') }}" class="btn btn-secondary me-2">
                        <i class="fas fa-times me-1"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane me-2"></i>Send Message
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
