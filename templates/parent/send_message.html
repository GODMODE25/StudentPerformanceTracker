{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Send Message</h1>
    <form method="POST" action="{{ url_for('parent.send_message') }}">
        <div class="form-group">
            <label for="recipient_id">Recipient</label>
            <select name="recipient_id" id="recipient_id" class="form-control">
                {% for recipient in recipients %}
                    <option value="{{ recipient.id }}">{{ recipient.full_name }} ({{ recipient.role }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" name="subject" id="subject" class="form-control">
        </div>
        <div class="form-group">
            <label for="body">Message</label>
            <textarea name="body" id="body" class="form-control" rows="5"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send</button>
    </form>
</div>
{% endblock %}
